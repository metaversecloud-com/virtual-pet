name: AWS-Deploy

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
  
env:
  REGISTRY: "368076259134.dkr.ecr.us-east-1.amazonaws.com"
  REPOSITORY: "sdk-example"
  IMAGE_TAG: ${{ github.event.repository.name }}
  GCP_PROJECT_ID: "topia-gcp" #${{ secrets.GCP_PROJECT_ID }}
  GCP_REPOSITORY: "sdk-apps"

permissions:
  id-token: write # This is required for requesting the JWT
  contents: read # This is required for actions/checkout
jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@master

      - uses: actions/setup-node@master
        with:
          node-version: 20.10
          cache: "npm"
      - run: npm i
      - run: CI=false npm run build

      - name: Set up QEMU
        uses: docker/setup-qemu-action@master

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@master
        with:
          role-to-assume: arn:aws:iam::368076259134:role/github-actions-role
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1.7.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug

      - name: Image Metadata
        id: metadata
        uses: docker/metadata-action@v3
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.REPOSITORY }}
          tags: |
            type=raw,value=${{ github.event.repository.name }}
      - name: Build and  tag
        run: |
          docker build -t ${{ steps.metadata.outputs.tags }} .

      - name: push docker image to Amazon ECR
        run: |
          docker push ${{ steps.metadata.outputs.tags }}

      - name: Publish
        run: |
          aws ecs update-service --service topia-dev-vpet0 --force-new-deployment --cluster topia-dev-sdk-apps
